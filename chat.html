<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>MATH.IA - Chat</title>
    <link rel="stylesheet" href="css\style.css"> 
    <script type="text/javascript" src="js\libs\jquery-3.5.1.min.js"></script>
    <script type="module" src="js\modules\chat.js"></script>
    <script type="module" src="js\modules\mathai.js"></script>
</head>

<body>

    <header class="topo">
        <div class="logo-area">
            <div class="logo-mini">MATH.IA</div>
            <div class="desc">Assistente inteligente de matemática</div>
        </div>

        <div class="menu">
            <button onclick="abrirMenu()">⋮</button>
            <div class="dropdown" id="dropdown">
                <p>Suporte</p>
                <p>Sobre</p>
                <p>Sair</p>
            </div>
        </div>
    </header>

    <div class="chat-container">
        <div class="chat-box" id="chat-box">
            <div class="bot">
                Olá estudante, <br>
                Como posso ajudar?
            </div>
        </div>

        <form action="php/chat_send.php" method="POST">
          <div id="chat-input" class="chat-input">
              <input type="text" id="chat-input-text" name="message" placeholder="Digite sua dúvida matemática..." required pattern="*\S+.*">
              <button id="chat-input-button" onclick="enviarMensagem()" type="submit">Enviar</button>
          </div>
        </form>
    </div>

</body>

</html>
